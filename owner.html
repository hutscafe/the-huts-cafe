<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#123328"><title>The Huts Owner Panel</title><link rel="stylesheet" href="css/style.css"></head><body class="owner-body">
<main id="loginView" class="login-wrap"><section class="login-card"><div class="logo">H</div><small>THE HUTS CAFE</small><h1>Order Panel</h1><p>Secure owner access</p><input id="ownerEmail" type="email" placeholder="Owner email"><input id="ownerPassword" type="password" placeholder="Password"><button id="loginBtn" class="primary">Sign in</button><p id="loginError"></p><a href="index.html">← Customer menu</a></section></main>
<main id="dashboard" class="dashboard hidden"><aside><h2>H <span>The Huts</span></h2><button data-tab="orders" class="active">▦ Orders</button><button data-tab="tables">⌑ Tables</button><button data-tab="menu">☷ Menu</button><button data-tab="qrcodes">▣ QR Codes</button><button data-tab="reports">↗ Reports</button><button id="logoutBtn">↪ Logout</button></aside><section class="dash-main"><header><div><small id="liveClock">LIVE SERVICE</small><h1 id="pageTitle">Orders</h1></div><b class="online">● Owner</b></header><div id="panel"></div></section></main>
<div id="checkoutModal" class="modal hidden"><section class="sheet checkout"><button class="close" data-checkout-close>×</button><small>FINAL CHECKOUT</small><h2 id="checkoutTitle"></h2><label>Discount ₹<input id="discount" type="number" min="0" value="0"></label><div class="payment"><button data-pay="Cash" class="active">Cash</button><button data-pay="UPI">UPI</button></div><div class="total"><span>Payable</span><strong id="payable"></strong></div><button id="completePayment" class="primary">Complete & Print Bill</button></section></div>
<section id="receipt" class="receipt"></section><script defer src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script><script type="module" src="js/owner.js"></script></body></html>
