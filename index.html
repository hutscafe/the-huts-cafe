<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="theme-color" content="#123328" />
    <title>The Huts Cafe</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="hero">
      <div class="hero-copy">
        <div class="brand">
          <b id="brandMark">H</b>
          <div>
            <small>THE HUTS CAFE</small>
            <h1>Good food.<br />Great mood.</h1>
          </div>
        </div>
        <div class="table-actions">
          <div class="table-pill">
            ● Ordering for <strong id="tableLabel">Table 01</strong>
          </div>
          <button id="repeatOrder" class="repeat-order hidden">
            ↻ Repeat last order
          </button>
        </div>
        <input
          id="search"
          class="search"
          placeholder="Search coffee, pizza, momos…"
        />
      </div>
    </header>
    <nav id="categories" class="categories"></nav>
    <main class="content">
      <div class="title-row">
        <div>
          <small>FRESHLY PREPARED</small>
          <h2 id="categoryTitle">Our favourites</h2>
        </div>
        <b id="itemCount"></b>
      </div>
      <section id="menuGrid" class="menu-grid"></section>
    </main>
    <footer class="vasuki-branding">
      <span>Smart Menu Technology by</span>
      <a href="https://www.vasukinfc.in" target="_blank" rel="noopener"
        >VASUKI NFC</a
      >
      <a
        href="https://wa.me/916377393721?text=I%20want%20a%20smart%20menu%20for%20my%20business"
        target="_blank"
        rel="noopener"
        >Get Smart Menu · WhatsApp 6377393721</a
      >
    </footer>
    <button id="viewCart" class="view-cart hidden"></button>
    <div id="cartModal" class="modal hidden">
      <section class="sheet">
        <button class="close" data-close>×</button
        ><small id="cartTable"></small>
        <h2>Your order</h2>
        <div id="cartLines"></div>
        <label
          >Special instructions<textarea
            id="orderNote"
            maxlength="300"
            placeholder="Less spicy, no onion…"
          ></textarea>
        </label>
        <div class="total">
          <span>Total</span><strong id="cartTotal">₹0</strong>
        </div>
        <button id="placeOrder" class="primary">Place order</button>
        <p id="orderMessage"></p>
      </section>
    </div>
    <div id="successModal" class="modal hidden">
      <section class="sheet success-sheet">
        <div class="success-check">✓</div>
        <small>ORDER CONFIRMED</small>
        <h2>Thank you!</h2>
        <p>Your order has reached the cafe.</p>
        <div class="success-details">
          <span id="successTable"></span><strong id="successOrder"></strong>
        </div>
        <p>Please wait while we prepare your food.</p>
        <button id="doneOrder" class="primary">Done</button>
      </section>
    </div>
    <script type="module" src="js/app.js"></script>
  </body>
</html>
